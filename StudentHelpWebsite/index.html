<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h2>
        Signup Form 
    </h2>
    </header>
    <form action="home.html">
        <div>
            <input type="text" placeholder="Enter Your Username">
            <br><br>
            <input type="text" placeholder="Enter College name">
            <br><br>
            <pre><b>Select you course</b>
                <select name="Course" id="Course">
                    <option value="Btech">Btech</option>
                    <option value="MBA">MBA</option>
                    <option value="BCA">BCA</option>
                    <option value="MTech">MTech</option>
                </select>
                <br><br><b>Select your branch</b>
                <select name="Branch" id="Branch">
                    <option value="CSE">CSE</option>
                    <option value="CSE-DS">CSE-DS</option>
                    <option value="CSE-AIML">CSE-AIML</option>
                    <option value="ELCE">ELCE</option>
                </select>
            </pre>
            <b>Enter the Subject</b>
            <br>
            <label>
                <input type="radio" value="JAVA" name="Subject">JAVA
            </label>
            <label>
                <input type="radio" value="DSA in C++" name="Subject">DSA in C++
            </label>
            <label>
                <input type="radio" value="Python" name="Subject">Pyhton
            </label>

            <br><br>
            <input type="Submit" value="submit">
        </div>
    </form>

</body>
</html>
